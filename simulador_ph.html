
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Escala de pH Químico - Simulador Educativo Offline</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap');
        body {
          font-family: 'Nunito', sans-serif;
        }
      </style>
      <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Nunito', 'sans-serif'],
              }
            }
          }
        }
      </script>
    </head>
    <body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
      <div class="w-full max-w-4xl h-[600px]">
        
      <div class="flex flex-col h-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="bg-gradient-to-r from-teal-500 via-emerald-500 to-green-500 p-4 flex flex-wrap justify-between items-center text-white">
          <div class="flex items-center gap-2">
            <span class="p-2 bg-white/20 rounded-xl font-bold">🧪</span>
            <div>
              <h2 class="font-extrabold text-base tracking-tight leading-none">Escala de pH Químico</h2>
              <p class="text-[10px] text-white/95">Ácidos, bases y dilución química interactiva</p>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="toggleTheory()" class="p-2 bg-white/10 hover:bg-white/20 rounded-xl text-xs">Teoría</button>
          </div>
        </div>

        <div class="flex-1 flex flex-col md:flex-row min-h-0 overflow-auto p-4 gap-4">
          <!-- Work Zone -->
          <div class="flex-1 flex flex-col justify-around bg-slate-50 border p-6 rounded-3xl relative items-center gap-4">
            
            <div class="flex items-center gap-8">
              <!-- Beaker -->
              <div class="w-40 h-56 border-4 border-slate-300 border-t-0 rounded-b-2xl relative overflow-hidden flex items-end">
                <div id="beaker-liquid" class="w-full transition-all duration-500" style="height: 50%; background-color: rgba(34, 197, 94, 0.8);"></div>
              </div>

              <!-- PH Indicator -->
              <div class="flex flex-col items-center gap-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">PH Promedio</span>
                <div id="ph-badge" class="w-24 h-24 rounded-full border-8 bg-white flex flex-col items-center justify-center font-black text-2xl text-green-500 border-green-500 shadow-md">
                  7.00
                </div>
                <span id="ph-state" class="text-xs font-bold text-slate-400">NEUTRO</span>
              </div>
            </div>

            <!-- Buttons -->
            <div class="flex gap-2">
              <button onclick="addLiquid(100)" class="px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold">+ 100ml Sustancia</button>
              <button onclick="addWater(100)" class="px-4 py-2.5 bg-sky-500 hover:bg-sky-600 text-white rounded-xl text-xs font-bold">+ 100ml Agua</button>
              <button onclick="emptyBeaker()" class="px-4 py-2.5 bg-slate-300 hover:bg-slate-400 text-slate-700 rounded-xl text-xs font-bold">Vaciar</button>
            </div>

          </div>

          <!-- Configuration -->
          <div class="w-full md:w-64 bg-slate-50 p-4 rounded-3xl border flex flex-col gap-4">
            <span class="font-extrabold text-xs text-slate-700">Substancia a Añadir:</span>
            <select id="substance-select" onchange="soundTick()" class="w-full p-2 bg-white border rounded-xl text-xs font-semibold">
              <option value="1.0">Ácido de Batería (pH 1.0)</option>
              <option value="2.5" selected>Jugo de Limón (pH 2.5)</option>
              <option value="5.0">Café Negro (pH 5.0)</option>
              <option value="7.0">Agua pura (pH 7.0)</option>
              <option value="10.0">Jabón Líquido (pH 10.0)</option>
              <option value="13.0">Limpiador de Desagües (pH 13.0)</option>
            </select>
          </div>
        </div>

        <div id="theory-box" class="hidden p-4 bg-amber-50 text-xs text-slate-600 border-t">
          El pH es una medida de acidez o alcalinidad que indica la concentración de iones de hidrógeno [H⁺] presentes en una solución. pH = -log10[H⁺].
        </div>
      </div>
    
      </div>

      <script>
        
      let mixture = [{ name: 'Agua Pura', volume: 500, ph: 7.0 }];
      
      function soundTick() {
        playTone(600, 0.05);
      }

      function playTone(freq, dur) {
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = actx.createOscillator();
          const gain = actx.createGain();
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.08, actx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          osc.connect(gain);
          gain.connect(actx.destination);
          osc.start();
          osc.stop(actx.currentTime + dur);
        } catch(e) {}
      }

      function toggleTheory() {
        document.getElementById('theory-box').classList.toggle('hidden');
      }

      function getPhColor(pH) {
        if (pH <= 3) return 'rgba(239, 68, 68, 0.85)';
        if (pH <= 6) return 'rgba(234, 179, 8, 0.85)';
        if (pH <= 8) return 'rgba(34, 197, 94, 0.85)';
        if (pH <= 11) return 'rgba(59, 130, 246, 0.85)';
        return 'rgba(168, 85, 247, 0.85)';
      }

      function calculatePH() {
        const totalVol = mixture.reduce((sum, item) => sum + item.volume, 0);
        if (totalVol === 0) {
          updateDisplay(7.0, 0);
          return;
        }

        const totalHMoles = mixture.reduce((sum, item) => {
          const concentration = Math.pow(10, -item.ph);
          return sum + (item.volume / 1000) * concentration;
        }, 0);

        const avgHConcentration = totalHMoles / (totalVol / 1000);
        let ph = -Math.log10(avgHConcentration);
        ph = Math.max(0, Math.min(14, ph));

        updateDisplay(ph, totalVol);
      }

      function updateDisplay(ph, vol) {
        const beaker = document.getElementById('beaker-liquid');
        beaker.style.height = (vol / 1000 * 100) + '%';
        beaker.style.backgroundColor = getPhColor(ph);

        const badge = document.getElementById('ph-badge');
        badge.innerText = ph.toFixed(2);
        badge.style.color = getPhColor(ph);
        badge.style.borderColor = getPhColor(ph);

        const stateLbl = document.getElementById('ph-state');
        if (ph < 6.8) stateLbl.innerText = 'ÁCIDO';
        else if (ph > 7.2) stateLbl.innerText = 'BÁSICO';
        else stateLbl.innerText = 'NEUTRO';
      }

      function addLiquid(amount) {
        const select = document.getElementById('substance-select');
        const ph = Number(select.value);
        const name = select.options[select.selectedIndex].text;

        const totalVol = mixture.reduce((sum, item) => sum + item.volume, 0);
        if (totalVol + amount > 1000) {
          playTone(150, 0.2); // Error
          return;
        }

        playTone(300, 0.1);
        mixture.push({ name, volume: amount, ph });
        calculatePH();
      }

      function addWater(amount) {
        addLiquidWithValues('Agua Pura', amount, 7.0);
      }

      function addLiquidWithValues(name, amount, ph) {
        const totalVol = mixture.reduce((sum, item) => sum + item.volume, 0);
        if (totalVol + amount > 1000) return;
        playTone(400, 0.1);
        mixture.push({ name, volume: amount, ph });
        calculatePH();
      }

      function emptyBeaker() {
        playTone(200, 0.1);
        mixture = [];
        calculatePH();
      }

      calculatePH();
    
      </script>
    </body>
    </html>
