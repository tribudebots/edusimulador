<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSim - Plataforma de Simuladores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
body { background: #f0f4ff; color: #253858; }

header {
  background: linear-gradient(135deg, #4F46E5, #06B6D4);
  padding: 60px 20px 50px;
  color: #fff;
  text-align: center;
}
header h1 { font-size: 48px; font-weight: 800; letter-spacing: -1px; }
header p { margin: 12px auto 24px; max-width: 600px; opacity: .85; font-size: 17px; }

.search {
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  background: #fff;
  border-radius: 50px;
  padding: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
}
.search input {
  flex: 1;
  border: none;
  outline: none;
  padding: 14px 20px;
  border-radius: 50px;
  font-size: 15px;
  color: #253858;
}
.search button {
  border: none;
  background: #FFB703;
  color: #253858;
  padding: 14px 28px;
  border-radius: 40px;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: background .2s;
}
.search button:hover { background: #f0a800; }

.container { max-width: 1200px; margin: auto; padding: 40px 20px; }
.section-title { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e8edf5;
  border-radius: 16px;
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: box-shadow .2s, transform .2s, border-color .2s;
  cursor: pointer;
}
.card:hover {
  border-color: #c7d2fe;
  box-shadow: 0 6px 20px rgba(79, 70, 229, .1);
  transform: translateY(-3px);
}

.icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 2px;
}

.card-title {
  font-size: 14px;
  font-weight: 700;
  color: #1e293b;
  line-height: 1.35;
}

.card-cat {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  width: fit-content;
  background: #f1f5f9;
  color: #64748b;
}

.card-link {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 700;
  color: #4F46E5;
  text-decoration: none;
  transition: color .15s;
}
.card-link:hover { color: #3730a3; }

footer {
  text-align: center;
  padding: 30px;
  background: #1E293B;
  color: #94a3b8;
  margin-top: 40px;
  font-size: 14px;
}
footer span { color: #fff; font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>🎓 EduSim</h1>
  <p>Explora simuladores educativos interactivos para aprender haciendo.</p>
  <div class="search">
    <input id="searchInput" placeholder="Buscar simulador..." oninput="filtrar()">
    <button onclick="filtrar()">Buscar</button>
  </div>
</header>

<div class="container">
  <p class="section-title">Todos los simuladores</p>
  <section class="grid" id="grid"></section>
</div>

<footer>© 2026 <span>EduSim</span> — Aprender jugando.</footer>

<script>
  let todos = [];

  function renderCards(lista) {
    const grid = document.getElementById("grid");
    grid.innerHTML = lista.length === 0
      ? `<p style="color:#94a3b8;grid-column:1/-1">No se encontraron simuladores.</p>`
      : lista.map(sim => `
        <div class="card">
          <div class="icon-wrap">${sim.icono}</div>
          <div class="card-title">${sim.titulo}</div>
          <span class="card-cat">${sim.categoria}</span>
          <a href="${sim.archivo}" class="card-link">Abrir <span>→</span></a>
        </div>
      `).join("");
  }

  function filtrar() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    renderCards(todos.filter(s =>
      s.titulo.toLowerCase().includes(q) ||
      s.categoria.toLowerCase().includes(q)
    ));
  }

  fetch("simuladores.json")
    .then(r => r.json())
    .then(data => { todos = data; renderCards(todos); });
</script>

</body>
</html>
