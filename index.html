<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSim - Plataforma de Simuladores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif}
body{background:#eef8ff;color:#253858}
header{background:linear-gradient(135deg,#4F46E5,#06B6D4);padding:55px;color:#fff;text-align:center}
header h1{font-size:48px;font-weight:800}
header p{margin:15px auto;max-width:700px}
.search{max-width:700px;margin:25px auto;display:flex;background:#fff;border-radius:50px;padding:8px}
.search input{flex:1;border:none;outline:none;padding:16px;border-radius:50px}
.search button{border:none;background:#FFB703;padding:16px 30px;border-radius:40px;font-weight:700}
.container{max-width:1250px;margin:auto;padding:40px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.08);transition:.3s}
.card:hover{transform:translateY(-6px)}
.banner{height:140px;display:flex;align-items:center;justify-content:center;font-size:64px;color:#fff}
.c1{background:#06B6D4}.c2{background:#4F46E5}.c3{background:#F97316}.c4{background:#10B981}.c5{background:#EC4899}.c6{background:#EF4444}
.content{padding:20px}
.content h3{margin-bottom:10px}
.content p{color:#555;line-height:1.6;margin-bottom:18px}
.btn{display:inline-block;background:#4F46E5;color:#fff;text-decoration:none;padding:12px 20px;border-radius:10px;font-weight:700}
footer{text-align:center;padding:30px;background:#1E293B;color:#fff;margin-top:40px}
</style>
</head>
<body>
<header>
<h1>🎓 EduSim</h1>
<p>Plataforma de simuladores educativos interactivos.</p>
<div class="search"><input placeholder="Buscar simulador..."><button>Buscar</button></div>
</header>
<div class="container">
<section class="grid">
</section>
</div>
<footer>© 2026 EduSim</footer>
<javascript>
fetch("simuladores.json")
.then(r=>r.json())
.then(simuladores=>{

    const grid=document.querySelector(".grid");

    simuladores.forEach(sim=>{

        grid.innerHTML+=`
        <div class="card">
            <h3>${sim.icono} ${sim.titulo}</h3>
            <p>${sim.categoria}</p>

            <a href="${sim.archivo}" class="btn">
                Abrir
            </a>

        </div>`;

    });

});
</javascript>
</body></html>
